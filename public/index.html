<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OG-og — OG 圖試衣間</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; background:#f4f4f0; color:#1a1a1a }
  .layout { display:flex; min-height:100vh; align-items:stretch }

  /* 左:九宮格全展開 */
  main { flex:1; min-width:0; padding:36px 56px 72px }
  main h1 { font-size:24px; font-weight:900; display:flex; align-items:baseline; gap:12px }
  main h1 small { font-size:13px; color:#999; font-weight:600 }
  #status { padding:10px 0 20px; font-size:14px; color:#888 }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:26px }
  .card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.06); border:3px solid transparent; cursor:pointer; transition:transform .15s }
  .card:hover { transform:translateY(-3px) }
  .card.sel { border-color:#111 }
  .thumb { width:100%; aspect-ratio:1200/630; overflow:hidden; position:relative; background:#eee }
  .thumb iframe { width:1200px; height:630px; border:0; transform-origin:0 0; position:absolute; pointer-events:none }
  .meta { display:flex; justify-content:space-between; align-items:center; padding:11px 15px }
  .meta b { font-size:15px }
  .meta small { color:#999 }
  .meta .dl { font-size:13px; font-weight:800; color:#fff; background:#111; padding:8px 16px; border-radius:999px; text-decoration:none; white-space:nowrap }

  /* 右:編輯面板 */
  aside { width:400px; flex-shrink:0; background:#fff; border-left:1px solid #e8e8e4; padding:30px 34px 48px; position:sticky; top:0; height:100vh; overflow-y:auto }
  aside h2 { font-size:17px; font-weight:900; display:flex; justify-content:space-between; align-items:center; margin-bottom:18px }
  aside h2 button { font-size:12px; font-weight:700; color:#888; background:none; border:0; cursor:pointer }
  .fetch { display:flex; gap:8px; margin-bottom:22px }
  .fetch input { flex:1; min-width:0; font-size:14px; padding:11px 13px; border:2px solid #ddd; border-radius:10px; outline:none }
  .fetch input:focus { border-color:#111 }
  .fetch button { font-size:14px; font-weight:800; padding:0 18px; border:0; border-radius:10px; background:#111; color:#fff; cursor:pointer; white-space:nowrap }
  .fetch button:disabled { opacity:.5; cursor:wait }
  .field { margin-bottom:16px }
  .field > span { display:block; font-size:13px; font-weight:800; color:#333; margin-bottom:6px }
  .field input[type=text], .field textarea, .field select { width:100%; font-size:14px; padding:10px 12px; border:1.5px solid #ddd; border-radius:9px; outline:none; font-family:inherit; background:#fff }
  .field textarea { resize:vertical; min-height:64px; line-height:1.5 }
  .field input:focus, .field textarea:focus { border-color:#111 }
  .imgrow { display:flex; gap:8px; align-items:center }
  .imgrow img { width:40px; height:40px; border-radius:8px; object-fit:cover; border:1px solid #eee; background:#f4f4f0; flex-shrink:0 }
  .imgrow input { flex:1; min-width:0 }
  .duo { display:flex; gap:10px }
  .duo .field { flex:1 }
  .colorrow { display:flex; align-items:center; gap:10px }
  .colorrow input[type=color] { width:46px; height:36px; border:1.5px solid #ddd; border-radius:9px; padding:2px; cursor:pointer; background:#fff }
  .colorrow code { font-size:13px; color:#888 }

  @media (max-width: 900px) { .layout { flex-direction:column-reverse } aside { width:auto; position:static; height:auto } }
</style>
</head>
<body>
<div class="layout">

  <main>
    <h1>OG-og 🖼️ <small>九種模板全展開 — 點卡片選、右邊改內容、下載 PNG(1200×630)</small></h1>
    <div id="status">貼一個網址(課程頁、銷售頁都行),或直接改右邊欄位手動玩。</div>
    <div class="grid" id="grid"></div>
  </main>

  <aside>
    <h2>編輯內容 <button id="reset">↺ 重設</button></h2>

    <div class="fetch">
      <input id="url" type="url" placeholder="https://classroo.tw/…" value="https://classroo.tw">
      <button id="go">抓取</button>
    </div>

    <div class="field"><span>標題</span><textarea id="f-title" rows="2"></textarea></div>
    <div class="field"><span>描述</span><textarea id="f-desc" rows="3"></textarea></div>
    <div class="field"><span>站名</span><input id="f-site" type="text"></div>

    <div class="field"><span>圖片網址</span>
      <div class="imgrow"><img id="p-image" alt=""><input id="f-image" type="text"></div>
    </div>
    <div class="field"><span>圖片裁切</span>
      <select id="f-imageFit"><option value="cover">Cover(裁滿,預設)</option><option value="contain">Contain(完整露出)</option></select>
    </div>

    <div class="field"><span>Logo 網址</span>
      <div class="imgrow"><img id="p-logo" alt=""><input id="f-logo" type="text"></div>
    </div>
    <div class="field"><span>Logo 裁切</span>
      <select id="f-logoFit"><option value="cover">Cover(裁滿,預設)</option><option value="contain">Contain(完整露出)</option></select>
    </div>

    <div class="field"><span>主色</span>
      <div class="colorrow"><input id="f-color" type="color" value="#6d5ce7"><code id="colorhex">#6d5ce7</code></div>
    </div>
  </aside>

</div>

<script src="/templates.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const F = ["title", "desc", "site", "image", "imageFit", "logo", "logoFit", "color"];
  const DEFAULTS = { site: "OG-og", title: "貼個網址,馬上有九張 OG 圖", desc: "抓取你頁面的標題、描述、圖片,套進九種模板", image: "", imageFit: "cover", logo: "", logoFit: "cover", color: "#6d5ce7" };
  let data = { ...DEFAULTS };

  const b64 = (obj) => encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(obj)))));

  function renderGrid() {
    const d = b64(data);
    const sel = document.querySelector(".card.sel")?.dataset.t;
    $("grid").innerHTML = OG_TEMPLATES.map((t) => `
      <div class="card${t.id === sel ? " sel" : ""}" data-t="${t.id}">
        <div class="thumb"><iframe loading="lazy" src="/preview?t=${t.id}&d=${d}"></iframe></div>
        <div class="meta">
          <div><b>${t.name}</b> <small>${t.note}</small></div>
          <a class="dl" href="/api/export?t=${t.id}&d=${d}">下載 PNG</a>
        </div>
      </div>`).join("");
    scaleThumbs();
    document.querySelectorAll(".card").forEach((c) =>
      c.addEventListener("click", () => {
        document.querySelectorAll(".card").forEach((x) => x.classList.remove("sel"));
        c.classList.add("sel");
      })
    );
  }

  function scaleThumbs() {
    document.querySelectorAll(".thumb").forEach((th) => {
      const s = th.clientWidth / 1200;
      th.querySelector("iframe").style.transform = `scale(${s})`;
    });
  }
  addEventListener("resize", scaleThumbs);

  function syncFields() {
    F.forEach((k) => ($("f-" + k).value = data[k] || ""));
    $("p-image").src = data.image || "";
    $("p-logo").src = data.logo || "";
    $("colorhex").textContent = data.color;
  }

  // 打字即時重渲染(輕 debounce,不用等失焦)
  let timer;
  F.forEach((k) =>
    $("f-" + k).addEventListener("input", () => {
      data = { ...data, [k]: $("f-" + k).value };
      $("colorhex").textContent = data.color;
      clearTimeout(timer);
      timer = setTimeout(() => { $("p-image").src = data.image || ""; $("p-logo").src = data.logo || ""; renderGrid(); }, 350);
    })
  );

  $("reset").addEventListener("click", () => { data = { ...DEFAULTS }; syncFields(); renderGrid(); });

  $("go").addEventListener("click", async () => {
    const url = $("url").value.trim();
    if (!url) return;
    $("go").disabled = true;
    $("status").textContent = "抓取中…";
    try {
      const res = await fetch("/api/og?url=" + encodeURIComponent(url));
      const og = await res.json();
      if (og.error) throw new Error(og.error);
      data = { ...DEFAULTS, ...og };
      syncFields();
      renderGrid();
      $("status").textContent = `抓到:「${og.title}」— 點卡片選、右邊微調、下載 PNG。`;
    } catch (e) {
      $("status").textContent = "抓取失敗:" + e.message + "(也可以直接手動填右邊欄位)";
    } finally {
      $("go").disabled = false;
    }
  });

  syncFields();
  renderGrid();
</script>
</body>
</html>
