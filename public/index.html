<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OG-og — OG 圖試衣間</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  body { font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; background:linear-gradient(180deg,#eef1f6,#f6f7f9 320px); color:#171a20 }
  button { font-family:inherit }

  /* ── navbar ── */
  nav { background:#fff; border-bottom:1px solid #e9eaee; padding:0 clamp(48px, 6vw, 110px); height:62px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10 }
  .brand { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:900 }
  .brand img { width:30px; height:30px }
  nav .right a { font-size:14px; font-weight:700; color:#555; text-decoration:none; border:1.5px solid #e0e1e6; padding:8px 18px; border-radius:999px }
  nav .right a:hover { border-color:#171a20; color:#171a20 }

  .layout { display:flex; align-items:flex-start; gap:clamp(28px, 3vw, 56px); padding:0 clamp(56px, 8vw, 170px) 0 clamp(56px, 8vw, 170px) }

  /* ── 左半 ── */
  main { flex:1; min-width:0; padding:38px 0 90px }
  .scanbar { display:flex; gap:10px; max-width:760px }
  .scanbar input { flex:1; min-width:0; font-size:15px; padding:13px 18px; border:2px solid #e0e1e6; border-radius:12px; outline:none; background:#fff }
  .scanbar input:focus { border-color:#171a20 }
  .scanbar button { font-size:15px; font-weight:800; padding:0 26px; border:0; border-radius:12px; background:#171a20; color:#fff; cursor:pointer }
  .scanbar button:disabled { opacity:.5; cursor:wait }
  #status { padding:10px 2px 20px; font-size:13.5px; color:#8a8f98 }

  /* 大預覽卡 */
  .previewCard { background:#fff; border-radius:18px; box-shadow:0 1px 3px rgba(16,24,40,.07), 0 8px 28px rgba(16,24,40,.05); overflow:hidden }
  .tabs { display:flex; align-items:center; gap:6px; padding:10px 22px 0; border-bottom:1px solid #eef0f3 }
  .tab { display:flex; align-items:center; justify-content:center; width:52px; height:44px; cursor:pointer; border-bottom:2.5px solid transparent; color:#9aa0a9 }
  .tab:hover { color:#171a20 }
  .tab.on { color:#171a20; border-bottom-color:#171a20 }
  .tab svg { width:19px; height:19px; fill:currentColor }
  .stage { padding:42px 48px 46px; display:flex; justify-content:center; background:#fff }
  .stageInner { width:min(660px, 100%) }
  .shot { width:100%; aspect-ratio:1200/630; overflow:hidden; position:relative; background:#f0f1f4 }
  .shot iframe { width:1200px; height:630px; border:0; position:absolute; transform-origin:0 0; pointer-events:none }
  .chrome-fb { border:1px solid #dddfe2; border-radius:10px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.08) }
  .chrome-fb .bar { background:#f0f2f5; padding:12px 16px }
  .chrome-fb .dom { font-size:12px; color:#606770; letter-spacing:.4px; text-transform:uppercase }
  .chrome-fb .t { font-size:16.5px; font-weight:700; color:#1c1e21; margin-top:3px }
  .chrome-x { border-radius:16px; overflow:hidden; position:relative; border:1px solid #e1e8ed }
  .chrome-x .pill { position:absolute; left:12px; bottom:12px; background:rgba(0,0,0,.75); color:#fff; font-size:13px; padding:3px 10px; border-radius:6px; max-width:80%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .chrome-li { border:1px solid #e0e1e6; border-radius:4px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08) }
  .chrome-li .bar { background:#fff; padding:12px 16px; border-top:1px solid #eee }
  .chrome-li .t { font-size:15.5px; font-weight:700; color:#1d2226 }
  .chrome-li .dom { font-size:12.5px; color:#7a8087; margin-top:4px }
  .chrome-dc { background:#2b2d31; border-radius:10px; padding:16px 18px; border-left:4px solid #5865f2 }
  .chrome-dc .site { font-size:12px; color:#b5bac1 }
  .chrome-dc .t { font-size:16px; font-weight:700; color:#00a8fc; margin:5px 0 4px }
  .chrome-dc .d { font-size:13.5px; color:#dbdee1; line-height:1.5; margin-bottom:12px }
  .chrome-dc .shot { border-radius:8px }

  /* 模板格 */
  .pick { display:flex; align-items:baseline; justify-content:space-between; margin:34px 2px 16px }
  .pick h2 { font-size:15px; font-weight:900; letter-spacing:1px; color:#5c626b }
  .pick span { font-size:13px; color:#9aa0a9 }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:22px }
  .card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 3px rgba(16,24,40,.08); outline:2.5px solid transparent; outline-offset:-2.5px; cursor:pointer; transition:transform .15s, box-shadow .15s; position:relative }
  .card:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(16,24,40,.12) }
  .card.sel { outline-color:#171a20 }
  .card.sel::after { content:"✓ 使用中"; position:absolute; top:10px; right:10px; background:#171a20; color:#fff; font-size:11.5px; font-weight:800; padding:5px 11px; border-radius:999px }
  .card .meta { display:flex; justify-content:space-between; align-items:center; padding:11px 15px }
  .card .meta b { font-size:14px }
  .card .meta small { color:#9aa0a9; font-size:12px }
  .card .dl { font-size:12.5px; font-weight:800; color:#171a20; background:#f0f1f4; padding:7px 14px; border-radius:999px; text-decoration:none; white-space:nowrap }
  .card .dl:hover { background:#171a20; color:#fff }

  /* ── 右:懸浮小面板(不貼邊、卡片式)── */
  /* 不 sticky、不自帶捲軸 — 跟著頁面自然捲 */
  .side { width:372px; flex-shrink:0; padding:38px 0 70px; display:flex; flex-direction:column; gap:18px }
  .panel { background:#fff; border:1px solid #e9eaee; border-radius:16px; box-shadow:0 1px 3px rgba(16,24,40,.06), 0 10px 34px rgba(16,24,40,.06); padding:18px 20px }
  .panel h2 { font-size:15px; font-weight:900; display:flex; justify-content:space-between; align-items:center; margin-bottom:14px }
  .panel h2 button { font-size:12px; font-weight:700; color:#8a8f98; background:none; border:0; cursor:pointer }
  .panel h2 button:hover { color:#171a20 }
  .field { margin-bottom:12px }
  .field > span { display:block; font-size:12.5px; font-weight:800; color:#3f434a; margin-bottom:5px }
  .field input[type=text], .field textarea, .field select { width:100%; font-size:13.5px; padding:9px 12px; border:1.5px solid #e0e1e6; border-radius:9px; outline:none; font-family:inherit; background:#fff; color:#171a20 }
  .field textarea { resize:vertical; min-height:58px; line-height:1.5 }
  .field input:focus, .field textarea:focus, .field select:focus { border-color:#171a20 }
  .imgrow { display:flex; gap:8px; align-items:center }
  .imgrow .pv { width:38px; height:38px; border-radius:8px; border:1.5px solid #e0e1e6; background:#f6f7f9 center/cover no-repeat; flex-shrink:0 }
  .imgrow input { flex:1; min-width:0 }
  .duo { display:flex; gap:10px }
  .duo .field { flex:1 }
  .colorrow { display:flex; align-items:center; gap:10px }
  .colorrow input[type=color] { width:44px; height:34px; border:1.5px solid #e0e1e6; border-radius:9px; padding:2px; cursor:pointer; background:#fff }
  .colorrow code { font-size:12.5px; color:#8a8f98 }
  .bigdl { display:block; text-align:center; margin-top:14px; background:#171a20; color:#fff; font-size:14px; font-weight:800; padding:12px; border-radius:11px; text-decoration:none }
  .bigdl:hover { opacity:.88 }

  /* Meta 檢查器 */
  .badges { display:flex; gap:6px }
  .bdg { font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:999px; display:flex; align-items:center; gap:4px }
  .bdg.err { background:#fee4e2; color:#d92d20 }
  .bdg.warn { background:#fef0c7; color:#b54708 }
  .bdg.ok { background:#d1fadf; color:#067647 }
  .insp-item { display:flex; gap:11px; padding:11px 0; border-top:1px solid #f0f1f4; align-items:flex-start }
  .insp-item:first-of-type { border-top:0 }
  .ic { width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; margin-top:1px }
  .ic.err { background:#fee4e2; color:#d92d20 }
  .ic.warn { background:#fef0c7; color:#b54708 }
  .ic.ok { background:#d1fadf; color:#067647 }
  .insp-item .tt { font-size:13.5px; font-weight:800; display:flex; justify-content:space-between; gap:8px }
  .insp-item .tt code { font-size:11px; color:#9aa0a9; font-weight:400 }
  .insp-item .dd { font-size:12.5px; color:#6b7078; line-height:1.55; margin-top:3px }
  .insp-item > div:last-child { flex:1; min-width:0 }
  .insp-item > .ic { flex:0 0 22px }

  @media (max-width: 1080px) { .layout { flex-direction:column-reverse; padding:0 24px } .side { width:auto; position:static; max-height:none } }
</style>
</head>
<body>

<nav>
  <div class="brand"><img src="/favicon.svg" alt="">OG-og</div>
  <div class="right"><a href="https://github.com/Jeffrey0117/OG-og" target="_blank">GitHub</a></div>
</nav>

<div class="layout">

  <main>
    <div class="scanbar">
      <input id="url" type="url" placeholder="https://classroo.tw/…(課程頁、銷售頁都行)" value="https://classroo.tw">
      <button id="go">掃描</button>
    </div>
    <div id="status">貼網址掃描,或直接改右邊欄位。下面大圖是「分享出去長怎樣」的實況模擬。</div>

    <section class="previewCard">
      <div class="tabs" id="tabs"></div>
      <div class="stage"><div class="stageInner" id="stage"></div></div>
    </section>

    <div class="pick"><h2>選擇模板(點卡片套用)</h2><span id="pickCount"></span></div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="side">
    <section class="panel">
      <h2>編輯內容 <button id="reset">↺ 重設</button></h2>

      <div class="field"><span>標題</span><textarea id="f-title" rows="2"></textarea></div>
      <div class="field"><span>描述</span><textarea id="f-desc" rows="3"></textarea></div>
      <div class="field"><span>站名</span><input id="f-site" type="text"></div>

      <div class="field"><span>圖片網址</span>
        <div class="imgrow"><div class="pv" id="p-image"></div><input id="f-image" type="text"></div>
      </div>
      <div class="field"><span>Logo 網址</span>
        <div class="imgrow"><div class="pv" id="p-logo"></div><input id="f-logo" type="text"></div>
      </div>
      <div class="duo">
        <div class="field"><span>圖片裁切</span>
          <select id="f-imageFit"><option value="cover">Cover 裁滿</option><option value="contain">Contain 完整</option></select>
        </div>
        <div class="field"><span>Logo 裁切</span>
          <select id="f-logoFit"><option value="cover">Cover 裁滿</option><option value="contain" selected>Contain 完整</option></select>
        </div>
      </div>
      <div class="field"><span>主色</span>
        <div class="colorrow"><input id="f-color" type="color" value="#6d5ce7"><code id="colorhex">#6d5ce7</code></div>
      </div>

      <a class="bigdl" id="bigdl" href="#">⬇ 下載目前這張 PNG</a>
    </section>

    <section class="panel">
      <h2>Meta 檢查器 <span class="badges" id="inspBadges"></span></h2>
      <div id="inspList"></div>
    </section>
  </div>

</div>

<script src="/templates.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const F = ["title", "desc", "site", "image", "imageFit", "logo", "logoFit", "color"];
  const DEFAULTS = { site: "OG-og", title: "貼個網址,馬上有十張 OG 圖", desc: "抓取你頁面的標題、描述、圖片,套進十種模板,挑一張下載", image: "", imageFit: "cover", logo: "", logoFit: "contain", color: "#6d5ce7", domain: "og-og.local" };
  let data = { ...DEFAULTS };
  let selTemplate = OG_TEMPLATES[0].id;
  let platform = "fb";
  let imgDims = null; // 掃描到的 og:image 原始尺寸(給檢查器)

  const b64 = (obj) => encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(obj)))));
  const escT = (s) => String(s).replace(/</g, "&lt;");

  const PLATFORMS = [
    { id: "fb", svg: '<svg viewBox="0 0 24 24"><path d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.09 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.26h3.33l-.53 3.49h-2.8V24C19.61 23.09 24 18.1 24 12.07z"/></svg>' },
    { id: "x", svg: '<svg viewBox="0 0 24 24"><path d="M18.9 1.15h3.68l-8.04 9.19L24 22.85h-7.41l-5.8-7.58-6.64 7.58H.47l8.6-9.83L0 1.15h7.59l5.24 6.93 6.07-6.93zm-1.29 19.5h2.04L6.49 3.24H4.3l13.31 17.41z"/></svg>' },
    { id: "li", svg: '<svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.55C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.72C24 .77 23.2 0 22.22 0z"/></svg>' },
    { id: "dc", svg: '<svg viewBox="0 0 24 24"><path d="M20.32 4.37a19.8 19.8 0 0 0-4.89-1.52.07.07 0 0 0-.08.04c-.21.38-.44.87-.6 1.25a18.3 18.3 0 0 0-5.5 0 12.6 12.6 0 0 0-.61-1.25.08.08 0 0 0-.08-.04 19.7 19.7 0 0 0-4.88 1.52.07.07 0 0 0-.03.03C.53 9.05-.32 13.58.1 18.06c0 .02.01.04.03.05a19.9 19.9 0 0 0 6 3.03.08.08 0 0 0 .08-.03c.46-.63.87-1.3 1.22-2a.08.08 0 0 0-.04-.11 13.1 13.1 0 0 1-1.87-.9.08.08 0 0 1 0-.12c.12-.1.25-.2.37-.3a.07.07 0 0 1 .08 0 14.2 14.2 0 0 0 12.06 0 .07.07 0 0 1 .08 0c.12.11.24.21.37.3a.08.08 0 0 1 0 .13c-.6.35-1.22.64-1.87.89a.08.08 0 0 0-.04.11c.36.7.77 1.37 1.22 2a.08.08 0 0 0 .08.03 19.8 19.8 0 0 0 6.02-3.03.08.08 0 0 0 .03-.05c.5-5.18-.84-9.68-3.55-13.66a.06.06 0 0 0-.03-.03zM8.02 15.33c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.96-2.42 2.16-2.42 1.21 0 2.18 1.1 2.16 2.42 0 1.34-.96 2.42-2.16 2.42zm7.97 0c-1.18 0-2.15-1.08-2.15-2.42 0-1.33.95-2.42 2.15-2.42 1.22 0 2.18 1.1 2.16 2.42 0 1.34-.94 2.42-2.16 2.42z"/></svg>' },
  ];

  function shotHtml() {
    return `<div class="shot"><iframe src="/preview?t=${selTemplate}&d=${b64(data)}"></iframe></div>`;
  }

  function renderStage() {
    const dom = (data.domain || "").toUpperCase();
    const chrome = {
      fb: `<div class="chrome-fb">${shotHtml()}<div class="bar"><div class="dom">${escT(dom)}</div><div class="t">${escT(data.title)}</div></div></div>`,
      x: `<div><div class="chrome-x">${shotHtml()}<div class="pill">${escT(data.title)}</div></div><div style="font-size:13px;color:#8b98a5;padding:7px 4px 0">來自 ${escT(data.domain || "")}</div></div>`,
      li: `<div class="chrome-li">${shotHtml()}<div class="bar"><div class="t">${escT(data.title)}</div><div class="dom">${escT(data.domain || "")}</div></div></div>`,
      dc: `<div class="chrome-dc"><div class="site">${escT(data.site)}</div><div class="t">${escT(data.title)}</div><div class="d">${escT(data.desc)}</div>${shotHtml()}</div>`,
    }[platform];
    $("stage").innerHTML = chrome;
    scaleShots($("stage"));
    $("bigdl").href = `/api/export?t=${selTemplate}&d=${b64(data)}`;
  }

  function renderTabs() {
    $("tabs").innerHTML = PLATFORMS.map((p) => `<div class="tab${p.id === platform ? " on" : ""}" data-p="${p.id}">${p.svg}</div>`).join("");
    document.querySelectorAll(".tab").forEach((t) =>
      t.addEventListener("click", () => { platform = t.dataset.p; renderTabs(); renderStage(); })
    );
  }

  function renderGrid() {
    const d = b64(data);
    $("grid").innerHTML = OG_TEMPLATES.map((t) => `
      <div class="card${t.id === selTemplate ? " sel" : ""}" data-t="${t.id}">
        <div class="shot"><iframe loading="lazy" src="/preview?t=${t.id}&d=${d}"></iframe></div>
        <div class="meta">
          <div><b>${t.name}</b><br><small>${t.note}</small></div>
          <a class="dl" href="/api/export?t=${t.id}&d=${d}" onclick="event.stopPropagation()">下載</a>
        </div>
      </div>`).join("");
    $("pickCount").textContent = `${OG_TEMPLATES.findIndex((t) => t.id === selTemplate) + 1} / ${OG_TEMPLATES.length}`;
    scaleShots($("grid"));
    document.querySelectorAll(".card").forEach((c) =>
      c.addEventListener("click", () => {
        selTemplate = c.dataset.t;
        document.querySelectorAll(".card").forEach((x) => x.classList.toggle("sel", x.dataset.t === selTemplate));
        $("pickCount").textContent = `${OG_TEMPLATES.findIndex((t) => t.id === selTemplate) + 1} / ${OG_TEMPLATES.length}`;
        renderStage();
      })
    );
  }

  function scaleShots(root) {
    root.querySelectorAll(".shot").forEach((sh) => {
      const f = sh.querySelector("iframe");
      requestAnimationFrame(() => { f.style.transform = `scale(${sh.clientWidth / 1200})`; });
    });
  }
  addEventListener("resize", () => { scaleShots(document.body); });

  /* ── Meta 檢查器(中文長度標準)── */
  function inspect() {
    const items = [];
    const t = data.title || "", d = data.desc || "";
    // 標題
    if (!t) items.push({ lv: "err", tt: "缺標題", tag: "og:title", dd: "分享卡最重要的一行,一定要有。" });
    else if (t.length < 8) items.push({ lv: "warn", tt: "標題偏短", tag: "og:title", dd: `${t.length} 字 — 8~30 字比較能吃滿卡片版面。` });
    else if (t.length > 40) items.push({ lv: "warn", tt: "標題偏長", tag: "og:title", dd: `${t.length} 字 — 超過 40 字在多數平台會被截斷。` });
    else items.push({ lv: "ok", tt: "標題 OK", tag: "og:title", dd: `「${t.slice(0, 22)}${t.length > 22 ? "…" : ""}」— ${t.length} 字。` });
    // 描述
    if (!d) items.push({ lv: "err", tt: "缺描述", tag: "og:description", dd: "FB/Discord 會顯示描述;空著等於浪費一行廣告位。" });
    else if (d.length > 60) items.push({ lv: "warn", tt: "描述偏長", tag: "og:description", dd: `${d.length} 字 — 社群預覽約顯示 40~60 字,手機更短。` });
    else items.push({ lv: "ok", tt: "描述 OK", tag: "og:description", dd: `${d.length} 字。` });
    // 圖片
    if (!data.image) items.push({ lv: "err", tt: "缺圖片", tag: "og:image", dd: "沒有 og:image 的連結在動態牆上幾乎沒人點。" });
    else if (imgDims?.error) items.push({ lv: "warn", tt: "圖片載入失敗", tag: "og:image", dd: "網址可能失效或擋外連,分享出去可能開天窗。" });
    else if (imgDims) {
      const ratio = imgDims.w / imgDims.h;
      if (Math.abs(ratio - 1.91) > 0.18) items.push({ lv: "warn", tt: "圖片比例不對", tag: "og:image", dd: `偵測到 ${imgDims.w}×${imgDims.h} — 多數平台預期 1.91:1(1200×630),會被裁切或留黑邊。用下面模板出圖就是標準尺寸。` });
      else if (imgDims.w < 600) items.push({ lv: "warn", tt: "圖片解析度偏低", tag: "og:image", dd: `${imgDims.w}×${imgDims.h} — 建議至少 1200×630,不然高解析螢幕會糊。` });
      else items.push({ lv: "ok", tt: "圖片尺寸 OK", tag: "og:image", dd: `${imgDims.w}×${imgDims.h},比例 ${ratio.toFixed(2)}:1。` });
    } else items.push({ lv: "ok", tt: "圖片存在", tag: "og:image", dd: "量測尺寸中…" });
    // 站名 / logo
    items.push(data.site ? { lv: "ok", tt: "站名 OK", tag: "og:site_name", dd: `「${data.site}」` } : { lv: "warn", tt: "缺站名", tag: "og:site_name", dd: "有站名,分享卡跟模板都更有品牌感。" });
    items.push(data.logo ? { lv: "ok", tt: "Logo 存在", tag: "favicon", dd: "模板會拿它當品牌識別。" } : { lv: "warn", tt: "缺 Logo", tag: "favicon", dd: "沒抓到 favicon;可手動貼一個。" });
    return items;
  }

  function renderInspector() {
    const items = inspect();
    const count = (lv) => items.filter((i) => i.lv === lv).length;
    const icons = { err: "✕", warn: "!", ok: "✓" };
    $("inspBadges").innerHTML = ["err", "warn", "ok"]
      .filter((lv) => count(lv))
      .map((lv) => `<span class="bdg ${lv}">${icons[lv]} ${count(lv)}</span>`).join("");
    $("inspList").innerHTML = items
      .sort((a, b) => ({ err: 0, warn: 1, ok: 2 }[a.lv] - { err: 0, warn: 1, ok: 2 }[b.lv]))
      .map((i) => `
        <div class="insp-item">
          <div class="ic ${i.lv}">${icons[i.lv]}</div>
          <div><div class="tt">${escT(i.tt)}<code>${i.tag}</code></div><div class="dd">${escT(i.dd)}</div></div>
        </div>`).join("");
  }

  function measureImage() {
    imgDims = null;
    if (!data.image) return renderInspector();
    const im = new Image();
    im.onload = () => { imgDims = { w: im.naturalWidth, h: im.naturalHeight }; renderInspector(); };
    im.onerror = () => { imgDims = { error: true }; renderInspector(); };
    im.src = data.image;
    renderInspector();
  }

  function syncFields() {
    F.forEach((k) => ($("f-" + k).value = data[k] || ""));
    $("p-image").style.backgroundImage = data.image ? `url("${data.image}")` : "none";
    $("p-logo").style.backgroundImage = data.logo ? `url("${data.logo}")` : "none";
    $("colorhex").textContent = data.color;
  }

  let timer;
  F.forEach((k) =>
    $("f-" + k).addEventListener("input", () => {
      data = { ...data, [k]: $("f-" + k).value };
      $("colorhex").textContent = data.color;
      clearTimeout(timer);
      timer = setTimeout(() => { syncFields(); renderStage(); renderGrid(); measureImage(); }, 400);
    })
  );

  $("reset").addEventListener("click", () => { data = { ...DEFAULTS }; syncFields(); renderStage(); renderGrid(); measureImage(); });

  $("go").addEventListener("click", scan);
  $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") scan(); });
  async function scan() {
    const url = $("url").value.trim();
    if (!url) return;
    $("go").disabled = true;
    $("status").textContent = "掃描中…";
    try {
      const res = await fetch("/api/og?url=" + encodeURIComponent(url));
      const og = await res.json();
      if (og.error) throw new Error(og.error);
      data = { ...DEFAULTS, ...og, domain: new URL(url).hostname };
      syncFields(); renderStage(); renderGrid(); measureImage();
      $("status").textContent = `抓到:「${og.title}」— 上面是分享實況,右下是這頁 OG 健檢。`;
    } catch (e) {
      $("status").textContent = "掃描失敗:" + e.message + "(可直接手動填右邊欄位)";
    } finally {
      $("go").disabled = false;
    }
  }

  renderTabs();
  syncFields();
  renderStage();
  renderGrid();
  measureImage();
</script>
</body>
</html>
